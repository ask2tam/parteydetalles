<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Solangel &amp; Enrique · Nos casamos</title>
  <meta name="description" content="Te invitamos a nuestra boda — 05 de Setiembre, Apata, Jauja."/>
  <meta property="og:title" content="Solangel &amp; Enrique · Nos casamos" />
  <meta property="og:description" content="Te invitamos a nuestra boda — 05 de Setiembre, Apata, Jauja." />
  <meta property="og:image" content="https://ask2tam.github.io/parteydetalles/assets/solangeyenrique_miniatura.jpg" />

  <link rel="preload" as="image" href="assets/solangeyenrique_portada.jpg"/>
  <link rel="stylesheet" href="assets/styles-DQlqYdCA.css" data-precedence="default"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&amp;display=swap" data-precedence="default"/>
  <link rel="icon" href="https://ask2tam.github.io/parteydetalles/assets/favicon.ico" type="image/x-icon"/>

  <script>
    if (window.location.pathname.includes('.html')) {
      window.history.replaceState(null, '', '/' + window.location.search + window.location.hash);
    }
  </script>

  <style>
    #btn-musica {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 70; /* Máxima prioridad sobre el sobre */
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #6b7139;
      border: none;
      color: white;
      display: none; 
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }
    #btn-musica:hover { transform: scale(1.05); background-color: #555b2e; }
    #btn-musica:active { transform: scale(0.95); }
    
    /* --- ANIMACIÓN DEL SOBRE --- */
    .wrapper-sobre {
      position: relative;
      width: 280px;
      height: 200px;
      background-color: #555b2e; /* Color interno del sobre */
      border-radius: 0 0 8px 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      margin-bottom: 40px;
    }

    /* Solapa superior (Triángulo que abre) */
    .solapa {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-top: 100px solid #6b7139; /* Color de la solapa */
      transform-origin: top;
      transition: transform 0.6s ease-in-out;
      z-index: 3;
    }

    /* Laterales e inferior del sobre */
    .cuerpo-sobre {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 140px solid #777d42;
      border-right: 140px solid #777d42;
      border-bottom: 100px solid #636934;
      border-radius: 0 0 8px 8px;
      z-index: 4;
      pointer-events: none;
    }

    /* La tarjeta con el nombre del invitado dentro del sobre */
    .tarjeta-invitado {
      position: absolute;
      bottom: 10px;
      left: 15px;
      width: 250px;
      height: 160px;
      background-color: #efe9dc;
      border-radius: 4px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 2;
      transition: transform 0.6s ease-in-out 0.4s; /* Delay para esperar que abra la solapa */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Clases de activación al hacer click */
    .sobre-abierto .solapa {
      transform: rotateX(180deg);
      z-index: 1; /* Pasa atrás al abrirse */
    }

    .sobre-abierto .tarjeta-invitado {
      transform: translateY(-90px); /* Saca la tarjeta hacia arriba */
    }

    .texto-personalizado {
      font-family: 'Montserrat', sans-serif;
      color: #6b7139;
      text-align: center;
    }
  </style>
</head>
<body>

<audio id="musica-boda" src="https://melody-weave-tool.lovable.app/__l5e/assets-v1/6853efb5-ab29-4783-a33a-9189e2497331/risk-it-all.mp3" loop></audio>

<button id="btn-musica" aria-label="Silenciar música">
  <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
  <svg id="icon-sound-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="22" y1="9" x2="16" y2="15"></line><line x1="16" y1="9" x2="22" y2="15"></line></svg>
</button>

<main class="min-h-screen w-full bg-[#efe9dc] flex justify-center">
  <div id="portada" class="fixed inset-0 z-50 w-full h-full bg-[#efe9dc] overflow-hidden flex flex-col items-center justify-center" role="dialog" aria-label="Portada de la invitación">
    <img src="assets/solangeyenrique_portada.jpg" alt="Solangel &amp; Enrique" class="absolute inset-0 w-full h-full object-cover opacity-30"/>
    
    <!-- Contenedor del Sobre Estilizado -->
    <div id="contenedor-sobre" class="wrapper-sobre z-10">
      <div class="solapa"></div>
      <div class="tarjeta-invitado">
        <div class="texto-personalizado">
          <p id="txt-invitado" style="font-size: 15px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 5px;"></p>
          <p id="txt-pases" style="font-size: 11px; font-weight: 400; font-style: italic; opacity: 0.9;"></p>
        </div>
      </div>
      <div class="cuerpo-sobre"></div>
    </div>

    <!-- Botón de Acción -->
    <div class="z-20 flex flex-col items-center">
      <button id="btn-abrir" class="px-6 py-2 rounded-full bg-[#6b7139] text-white text-xs tracking-[0.25em] uppercase shadow-xl hover:scale-105 transition animate-pulse focus:outline-none" style="font-family:'Montserrat', sans-serif;" aria-label="Abrir invitación">
        Abrir invitación
      </button>
    </div>

  </div>
</main>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const nombreInvitado = urlParams.get('invitado');
  const numeroPases = urlParams.get('pases');
  if (nombreInvitado) {
    document.getElementById('txt-invitado').textContent = "Para: " + nombreInvitado;
  }
  if (numeroPases) {
    const textoPase = numeroPases === '1' ? '(1) pase' : `(${numeroPases}) pases`;
    document.getElementById('txt-pases').textContent = `Tenemos ${textoPase} para ti`;
  }

  const musica = document.getElementById('musica-boda');
  const btnMusica = document.getElementById('btn-musica');
  const iconOn = document.getElementById('icon-sound-on');
  const iconOff = document.getElementById('icon-sound-off');
  const contenedorSobre = document.getElementById('contenedor-sobre');

  document.getElementById('btn-abrir').addEventListener('click', function() {
    // 1. Desencadenamos la animación CSS agregando la clase activa al sobre
    contenedorSobre.classList.add('sobre-abierto');

    // 2. Mostramos de inmediato el botón flotante de música
    btnMusica.style.display = 'flex';

    // 3. Intentamos reproducir la música
    musica.play()
      .then(() => {
        actualizarIconos(false);
      })
      .catch(error => {
        console.log("Audio restringido por el navegador:", error);
        actualizarIconos(true);
      });

    // 4. Retrasamos la apertura de la ventana externa para que el usuario aprecie el sobre abriéndose
    setTimeout(() => {
      window.open("https://invitaciones.parteydetalles.com/web-lovable-solangel-enrique", "_blank");
    }, 1200);
  });

  btnMusica.addEventListener('click', function() {
    if (musica.paused) { 
      musica.play(); 
      actualizarIconos(false); 
    } else { 
      musica.pause(); 
      actualizarIconos(true); 
    }
  });

  function actualizarIconos(estaPausado) {
    if (estaPausado) {
      iconOn.style.display = 'none';
      iconOff.style.display = 'block';
    } else {
      iconOn.style.display = 'block';
      iconOff.style.display = 'none';
    }
  }
</script>

</body>
</html>
